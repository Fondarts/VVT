<!DOCTYPE html>
<html lang="es" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Review V03</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: "Helvetica Neue", "HelveticaNeue", Helvetica, Arial, sans-serif;
        background: #191919;
        color: #F7F4EB;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
      }
      #root { width: 100vw; height: 100vh; }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #191919; }
      ::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 6px; }
      ::-webkit-scrollbar-thumb:hover { background: #B5ADA8; }
    </style>
    <!--
      coi-serviceworker.js enables SharedArrayBuffer on static deployments
      (GitHub Pages, Netlify, etc.) by injecting COOP/COEP headers via
      a Service Worker. The Vite dev server sets these headers directly.
    -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
      // In dev, Vite sets COOP/COEP headers directly — no SW needed.
      // In production, register the service worker for SharedArrayBuffer support.
      if (window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
        const s = document.createElement('script');
        s.src = '/coi-serviceworker.js';
        document.head.appendChild(s);
      } else if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(regs =>
          regs.forEach(r => r.unregister())
        );
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
