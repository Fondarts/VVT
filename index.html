<!DOCTYPE html>
<html lang="es" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kissd Video Validation Tool V2</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: "Helvetica Neue", "HelveticaNeue", Helvetica, Arial, sans-serif;
        background: #191919;
        color: #F7F4EB;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
      }
      #root { width: 100vw; height: 100vh; }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #191919; }
      ::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 6px; }
      ::-webkit-scrollbar-thumb:hover { background: #B5ADA8; }
    </style>
    <!--
      coi-serviceworker.js enables SharedArrayBuffer on static deployments
      (GitHub Pages, Netlify, etc.) by injecting COOP/COEP headers via
      a Service Worker. The Vite dev server sets these headers directly.
    -->
    <script src="/coi-serviceworker.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
